{% extends 'base.html' %}

{% block content %}
<div class="row g-4">
    <div class="col-lg-3 col-xl-2">
        <div class="card admin-sidebar">
            <div class="card-body">
                <p class="dashboard-label mb-3">Admin Panel</p>
                <div class="d-grid gap-2">
                    <a href="{% url 'admin_dashboard' %}" class="btn {% if active_admin_tab == 'dashboard' %}btn-dark{% else %}btn-outline-dark{% endif %}">Dashboard</a>
                    <a href="{% url 'admin_bookings' %}" class="btn {% if active_admin_tab == 'bookings' %}btn-dark{% else %}btn-outline-dark{% endif %}">Bookings</a>
                    <a href="{% url 'admin_services' %}" class="btn {% if active_admin_tab == 'services' %}btn-dark{% else %}btn-outline-dark{% endif %}">Services</a>
                    <a href="{% url 'admin_stylists' %}" class="btn {% if active_admin_tab == 'stylists' %}btn-dark{% else %}btn-outline-dark{% endif %}">Stylists</a>
                </div>
            </div>
        </div>
    </div>
    <div class="col-lg-9 col-xl-10">
        {% block admin_content %}{% endblock %}
    </div>
</div>
{% endblock %}
