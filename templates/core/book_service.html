{% extends 'base.html' %}

{% block content %}
<section class="page-header mb-4">
    <h1 class="display-6 fw-bold">Book a Service</h1>
    <p class="text-muted">Select your preferred service, stylist, and appointment time.</p>
</section>

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small mt-1">{{ field.errors|join:", " }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-dark">Submit Booking</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
